<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>REDTUBE Admin</title>
<style>
  * { box-sizing: border-box; margin:0; padding:0; }
  body { background:#0a0e17; color:#e5e9f0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; }
  #app { max-width: 900px; margin: 0 auto; padding: 20px; }
  h1 { font-size: 20px; margin-bottom: 20px; }
  .login-box { max-width: 320px; margin: 80px auto; background:#131a2a; padding: 24px; border-radius: 14px; }
  input, textarea { width:100%; padding:10px; border-radius:8px; border:1px solid #1f2937; background:#0a0e17; color:#e5e9f0; margin-bottom:10px; font-size:14px; }
  button { padding:10px 16px; border-radius:8px; border:none; background:#3b82f6; color:#fff; font-weight:600; cursor:pointer; font-size:13px; }
  button.danger { background:#ef4444; }
  button.gray { background:#374151; }
  .tabs { display:flex; gap:8px; margin-bottom: 20px; flex-wrap: wrap; }
  .tabs button { background:#131a2a; color:#8b94a7; }
  .tabs button.active { background:#3b82f6; color:#fff; }
  table { width:100%; border-collapse: collapse; background:#131a2a; border-radius: 10px; overflow: hidden; }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #1f2937; font-size:13px; }
  th { color:#8b94a7; font-weight:600; }
  .card { background:#131a2a; padding:16px; border-radius:12px; margin-bottom:16px; }
  .row { display:flex; gap:8px; align-items:center; }
  .status { padding:2px 8px; border-radius:10px; font-size:11px; }
  .status.pending { background:rgba(234,179,8,0.15); color:#eab308; }
  .status.approved { background:rgba(34,197,94,0.15); color:#22c55e; }
  .status.rejected { background:rgba(239,68,68,0.15); color:#f87171; }
</style>
</head>
<body>
<div id="app">
  <div class="login-box" id="loginBox">
    <h1>REDTUBE Admin</h1>
    <input type="password" id="pwInput" placeholder="Admin password" />
    <button style="width:100%;" onclick="login()">Login</button>
  </div>
  <div id="panel" style="display:none;">
    <h1>REDTUBE Admin Panel</h1>
    <div class="tabs">
      <button data-tab="withdraws" class="active">Withdraws</button>
      <button data-tab="users">Users</button>
      <button data-tab="tasks">Tasks</button>
      <button data-tab="submissions">Task Submissions</button>
      <button data-tab="promo">Promo Codes</button>
    </div>
    <div id="tabContent"></div>
  </div>
</div>
<script src="admin.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>REDTUBE</title>
<link rel="stylesheet" href="style.css" />
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<div id="app">

  <!-- Header (hidden during loading) -->
  <div class="header" id="mainHeader" style="display:none;">
    <div class="brand">
      <div class="logo">R</div>
      <span>REDTUBE</span>
    </div>
    <div class="icons">
      <button class="icon-btn" id="historyBtn" title="Withdraw history">🕐</button>
      <button class="icon-btn" id="profileBtn" title="Profile">👤</button>
    </div>
  </div>

  <!-- Loading screen -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-logo">▶</div>
    <div class="loading-title">RED<span>TUBE</span></div>
    <div class="loading-sub">Watch · Earn · Withdraw</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <!-- Join gate -->
  <div class="join-gate" id="joinGate" style="display:none;">
    <div class="rocket-ring">🚀</div>
    <h2>One last step to earn</h2>
    <p>Join our official channel &amp; community to unlock REDTUBE.</p>
    <div class="join-buttons">
      <a class="join-btn" href="https://t.me/redtubecommunity" target="_blank"><span class="emoji">📢</span>Join Channel</a>
      <a class="join-btn" href="https://t.me/redtubeofficial0" target="_blank"><span class="emoji">💬</span>Join Community</a>
    </div>
    <button class="check-btn" id="checkJoinBtn">✅ I've joined, check now</button>
    <div class="error-msg" id="joinError" style="display:none;">You haven't joined both yet. Please join and try again.</div>
  </div>

  <!-- Main content -->
  <div class="content" id="mainContent" style="display:none;"></div>

  <!-- Bottom nav -->
  <div class="bottom-nav" id="bottomNav" style="display:none;">
    <button class="nav-item active" data-tab="home"><span class="nav-icon">🏠</span>Home</button>
    <button class="nav-item" data-tab="video"><span class="nav-icon">📺</span>Video</button>
    <button class="nav-item center" data-tab="earning"><span class="nav-icon">💰</span>Earning</button>
    <button class="nav-item" data-tab="task"><span class="nav-icon">✅</span>Task</button>
    <button class="nav-item" data-tab="refer"><span class="nav-icon">👥</span>Refer</button>
  </div>

  <!-- Modals -->
  <div class="modal-overlay" id="withdrawModal"></div>
  <div class="modal-overlay" id="historyModal"></div>
  <div class="modal-overlay" id="profileModal"></div>
  <div class="modal-overlay" id="promoModal"></div>

</div>
<script src="app.js"></script>
</body>
</html>
